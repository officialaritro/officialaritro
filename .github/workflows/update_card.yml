name: Update Neofetch Card

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      force_refresh:
        description: "Force-refresh stats cache"
        required: false
        default: false
        type: boolean

concurrency:
  group: neofetch-card-update
  cancel-in-progress: false

permissions:
  contents: write

env:
  NODE_VERSION: "20"

jobs:
  update-card:
    name: Update Neofetch Card
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Cache stats data
        uses: actions/cache@v4
        with:
          path: cache/
          key: neofetch-stats-${{ runner.os }}-${{ github.repository }}-${{ github.ref_name }}

      - name: Pre-flight checks
        run: |
          set -euo pipefail
          test -f package.json
          test -f scripts/update_card.js
          test -f scripts/diagnostic.js
          test -f aritro-neofetch.svg

          if [ -z "${{ secrets.GH_STATS_TOKEN }}" ]; then
            echo "Missing GH_STATS_TOKEN secret (required for private stats)."
            exit 1
          fi

          if [ -z "${{ secrets.DOB_ISO }}" ]; then
            echo "DOB_ISO secret missing. Script will use fallback age text."
          fi

      - name: Install dependencies
        run: npm ci

      - name: Validate SVG placeholders
        run: npm run diagnostic

      - name: Update card
        env:
          GH_STATS_TOKEN: ${{ secrets.GH_STATS_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOB_ISO: ${{ secrets.DOB_ISO }}
          GITHUB_USERNAME: ${{ github.repository_owner }}
          FORCE_REFRESH: ${{ inputs.force_refresh && 'true' || 'false' }}
        run: |
          set -euo pipefail
          node scripts/update_card.js

      - name: Verify changes
        id: verify
        run: |
          if git diff --quiet aritro-neofetch.svg; then
            echo "svg_changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "svg_changed=true" >> "$GITHUB_OUTPUT"
            git diff --stat aritro-neofetch.svg
          fi

      - name: Commit and push
        if: steps.verify.outputs.svg_changed == 'true'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add aritro-neofetch.svg
          git commit -m "chore: update neofetch card - $(date -u +"%Y-%m-%d %H:%M UTC") [skip ci]"
          git push

      - name: Summary
        if: always()
        run: |
          echo "# Neofetch Card Update" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Status: ${{ job.status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Trigger: ${{ github.event_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- SVG changed: ${{ steps.verify.outputs.svg_changed || 'false' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Private stats token: ${{ secrets.GH_STATS_TOKEN != '' && 'present' || 'missing' }}" >> "$GITHUB_STEP_SUMMARY"
